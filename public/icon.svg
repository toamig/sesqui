<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Sesqui favicon: the Midnight theme swatch chip, scaled up. A rounded tile
       in the Midnight background, a dark stone (V) and a light stone (H), a gold
       accent bar along the bottom, and the gold selection ring. Mirrors the
       40px chip in SkinPicker.css. -->
  <defs>
    <linearGradient id="vstone" x1="0.35" y1="0.3" x2="1" y2="1">
      <stop offset="0%" stop-color="#26264a" />
      <stop offset="100%" stop-color="#0c0c14" />
    </linearGradient>
    <linearGradient id="hstone" x1="0.35" y1="0.3" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#d2d2e0" />
    </linearGradient>
    <!-- clip everything inside the rounded chip, like the CSS overflow:hidden -->
    <clipPath id="chip">
      <rect x="56" y="56" width="400" height="400" rx="96" />
    </clipPath>
  </defs>

  <!-- chip contents, clipped to the rounded square -->
  <g clip-path="url(#chip)">
    <!-- background -->
    <rect x="56" y="56" width="400" height="400" fill="#1c1c36" />
    <!-- two stones, centred a touch above middle (matches the chip) -->
    <circle cx="188" cy="238" r="66" fill="url(#vstone)" />
    <circle cx="188" cy="238" r="66" fill="none" stroke="#3c3c60" stroke-width="3" />
    <circle cx="324" cy="238" r="66" fill="url(#hstone)" />
    <!-- gold accent bar along the bottom -->
    <rect x="56" y="386" width="400" height="70" fill="#ffd54a" />
  </g>

  <!-- subtle inner edge, then the gold selection ring -->
  <rect x="56" y="56" width="400" height="400" rx="96" fill="none"
        stroke="rgba(128,128,128,0.4)" stroke-width="2" />
  <rect x="46" y="46" width="420" height="420" rx="106" fill="none"
        stroke="#ffd54a" stroke-width="18" />
</svg>
